{% extends "base.html" %}

{% block title %}{{ title }} · 纸上博客{% endblock %}

{% block content %}
  <section class="pagehead">
    <h1 class="pagehead__title">{{ title }}</h1>
    <div class="pagehead__actions">
      <a class="btn btn--ghost" href="{% url 'home' %}">返回首页</a>
    </div>
  </section>

  <section class="list">
    {% for post in page_obj %}
      {% include "blog/_post_card.html" with post=post %}
    {% empty %}
      <div class="empty">
        <div class="empty__title">这里暂时没有文章</div>
        <div class="empty__hint">试试更换分类/标签或返回首页。</div>
      </div>
    {% endfor %}
  </section>

  {% include "_pagination.html" %}
{% endblock %}
