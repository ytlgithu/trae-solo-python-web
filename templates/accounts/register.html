{% extends "base.html" %}

{% block title %}注册 · 纸上博客{% endblock %}

{% block content %}
  <section class="auth">
    <div class="auth__card">
      <h1 class="auth__title">注册</h1>
      {% if form.errors %}
        <div class="formerror">请检查输入内容并重试。</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label class="field">
          <span class="field__label">用户名</span>
          {{ form.username }}
        </label>
        <label class="field">
          <span class="field__label">邮箱</span>
          {{ form.email }}
        </label>
        <label class="field">
          <span class="field__label">密码</span>
          {{ form.password1 }}
        </label>
        <label class="field">
          <span class="field__label">确认密码</span>
          {{ form.password2 }}
        </label>
        <button class="btn btn--wide" type="submit">创建账号</button>
      </form>
      <div class="auth__foot">
        <span>已经有账号？</span>
        <a href="{% url 'login' %}">登录</a>
      </div>
    </div>
  </section>
{% endblock %}
