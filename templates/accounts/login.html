{% extends "base.html" %}

{% block title %}登录 · 纸上博客{% endblock %}

{% block content %}
  <section class="auth">
    <div class="auth__card">
      <h1 class="auth__title">登录</h1>
      {% if form.errors %}
        <div class="formerror">用户名/密码不正确，或账号未激活。</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label class="field">
          <span class="field__label">用户名</span>
          {{ form.username }}
        </label>
        <label class="field">
          <span class="field__label">密码</span>
          {{ form.password }}
        </label>
        {% if next %}
          <input type="hidden" name="next" value="{{ next }}" />
        {% endif %}
        <button class="btn btn--wide" type="submit">登录</button>
      </form>
      <div class="auth__foot">
        <span>没有账号？</span>
        <a href="{% url 'register' %}">注册</a>
      </div>
    </div>
  </section>
{% endblock %}
