{% if page_obj.paginator.num_pages > 1 %}
  <nav class="pager" aria-label="分页">
    <div class="pager__inner">
      {% if page_obj.has_previous %}
        <a class="pager__btn" href="?page={{ page_obj.previous_page_number }}{% if q is not None %}&q={{ q|urlencode }}{% endif %}">上一页</a>
      {% else %}
        <span class="pager__btn pager__btn--disabled">上一页</span>
      {% endif %}

      <span class="pager__info">第 {{ page_obj.number }} / {{ page_obj.paginator.num_pages }} 页</span>

      {% if page_obj.has_next %}
        <a class="pager__btn" href="?page={{ page_obj.next_page_number }}{% if q is not None %}&q={{ q|urlencode }}{% endif %}">下一页</a>
      {% else %}
        <span class="pager__btn pager__btn--disabled">下一页</span>
      {% endif %}
    </div>
  </nav>
{% endif %}
